spring:
  application:
    name: ai-course-builder
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_course_builder
    username: aicourse
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080